<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electrical Pro Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>⚡ Electrical Engineering Toolkit</h1>
</header>

<div class="container">

<nav>
    <button onclick="show('ohm')">Ohm's Law</button>
    <button onclick="show('power')">Power</button>
    <button onclick="show('energy')">Energy</button>
    <button onclick="show('resistor')">Resistor</button>
    <button onclick="show('ac')">AC Calculator</button>
</nav>

<main>

<section id="ohm" class="card">
    <h2>Ohm's Law</h2>
    <input id="V" placeholder="Voltage (V)">
    <input id="I" placeholder="Current (A)">
    <input id="R" placeholder="Resistance (Ω)">
    <button onclick="calcOhm()">Calculate</button>
    <p id="ohmOut"></p>
</section>

<section id="power" class="card hidden">
    <h2>Power</h2>
    <input id="Vp" placeholder="Voltage (V)">
    <input id="Ip" placeholder="Current (A)">
    <button onclick="calcPower()">Calculate</button>
    <p id="powerOut"></p>
</section>

<section id="energy" class="card hidden">
    <h2>Energy</h2>
    <input id="Pe" placeholder="Power (W)">
    <input id="t" placeholder="Time (s)">
    <button onclick="calcEnergy()">Calculate</button>
    <p id="energyOut"></p>
</section>

<section id="resistor" class="card hidden">
    <h2>Resistor Calculator</h2>
    <select id="b1"></select>
    <select id="b2"></select>
    <select id="mult"></select>
    <button onclick="calcRes()">Calculate</button>
    <p id="resOut"></p>
</section>

<section id="ac" class="card hidden">
    <h2>AC Calculator</h2>
    <input id="Vrms" placeholder="Voltage (V)">
    <input id="Irms" placeholder="Current (A)">
    <input id="pf" placeholder="Power Factor (cosφ)">
    <button onclick="calcAC()">Calculate</button>
    <p id="acOut"></p>
</section>
<section id="react" class="card hidden">
<h2>Reactance</h2>
<input id="freq" placeholder="Frequency (Hz)">
<input id="induct" placeholder="Inductance (H)">
<input id="cap" placeholder="Capacitance (F)">
<button onclick="calcReactance()">Calculate</button>
<p id="reactOut"></p>
</section>

<section id="impedance" class="card hidden">
<h2>Impedance</h2>
<input id="Rz" placeholder="Resistance (Ω)">
<input id="Xl" placeholder="XL">
<input id="Xc" placeholder="XC">
<button onclick="calcImpedance()">Calculate</button>
<p id="impOut"></p>
</section>
</main>
</div>

<script src="app.js"></script>

</body>
</html>
